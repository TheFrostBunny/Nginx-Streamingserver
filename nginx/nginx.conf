load_module modules/ngx_rtmp_module.so;

user www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        application live {
            live on;
            record off;

            # HLS - Standard Stabil
            hls on;
            hls_path /var/www/html/stream/hls;
            hls_fragment 4s;           # 4 sekunders biter (Standard)
            hls_playlist_length 20s;   # 20 sekunder buffer totalt
            hls_cleanup on;            # Rydder opp etter seg
            hls_continuous off;
            hls_fragment_naming sequential;
        }
    }
}

http {
    include mime.types;
    sendfile on;
    tcp_nopush on;
        tcp_nodelay on; # Reduserer latency for små pakker
        keepalive_timeout 15;
        keepalive_requests 1000;
        server_tokens off;
        reset_timedout_connection on;
        lingering_close off;

        # Aktiver gzip-komprimering
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;

    client_max_body_size 200M;
    server {
            listen 80;
            listen 443 ssl http2; # HTTP/2 og SSL (krever sertifikat)
            ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem; # Endre til ditt sertifikat
            ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key; # Endre til din nøkkel
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers HIGH:!aNULL:!MD5;

        # Node.js Dashboard
        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 60s;
                proxy_connect_timeout 10s;
                proxy_buffering off; # Viktig for lav latency til backend
                proxy_request_buffering off;
                proxy_max_temp_file_size 0;
        }

        # Video-levering (HLS)
        location /hls {
            root /var/www/html/stream;
            add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Cache-Control' 'public, max-age=10';
            
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
                expires 10s;

                directio 512; # Forbedrer ytelse på store filer
                sendfile on;
                tcp_nopush on;
                tcp_nodelay on;
        }
    }
}
