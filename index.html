<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <!-- Viktig: Viewport sørger for at siden ikke zoomer ut på mobil -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Live Stream</title>
    

    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #23234b 100%);
            color: #fff;
            text-align: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            animation: fadeIn 1.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .video-container {
            width: 100%;
            max-width: 900px;
            margin: 32px auto 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border-radius: 18px;
            overflow: hidden;
            background: #23234b;
            position: relative;
        }
        h1 {
            color: #ff1744;
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-top: 40px;
            margin-bottom: 18px;
            text-shadow: 0 2px 12px #000a;
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            from { text-shadow: 0 2px 12px #000a, 0 0 0 #ff1744; }
            to { text-shadow: 0 2px 24px #ff1744, 0 0 8px #ff1744; }
        }
        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            z-index: 10;
            display: none;
        }
        .spinner:after {
            content: "";
            display: block;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 6px solid #ff1744;
            border-color: #ff1744 transparent #ff1744 transparent;
            animation: spin 1.1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .video-js {
            background: #181828;
        }
        .vjs-control-bar {
            font-size: 1.1em;
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .video-container { max-width: 100vw; border-radius: 0; }
        }
    </style>
</head>
<body>

    <h1>🔴 LIVE STREAM</h1>
    <div class="video-container">
        <div class="spinner" id="spinner"></div>
        <video id="my-video"
               class="video-js vjs-default-skin vjs-big-play-centered"
               controls
               preload="auto"
               muted
               playsinline>
            <source src="/hls/test.m3u8" type="application/x-mpegURL">
            <p class="vjs-no-js">Vennligst aktiver JavaScript for å se strømmen.</p>
        </video>
    </div>

    <script>
        // Spinner vises mens videoen laster
        const spinner = document.getElementById('spinner');
        var player = videojs('my-video', {
            liveui: true,
            fluid: true,
            responsive: true,
            autoplay: 'any'
        });

        function showSpinner() { spinner.style.display = 'block'; }
        function hideSpinner() { spinner.style.display = 'none'; }

        showSpinner();
        player.on('waiting', showSpinner);
        player.on('playing', hideSpinner);
        player.on('canplay', hideSpinner);
        player.on('loadstart', showSpinner);
        player.on('error', function() {
            hideSpinner();
            console.log("Strømmen ble brutt, prøver på nytt om 5 sekunder...");
            setTimeout(function() {
                player.src(player.src());
                player.load();
                player.play();
            }, 5000);
        });
        // Skjul spinner hvis videoen ikke starter
        setTimeout(hideSpinner, 8000);
    </script>

</body>
</html>
